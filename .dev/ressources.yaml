# Manifeste des versions des ressources livrables vivantes.
# Voir ADR-004-ressources-livrables (typologie et versionnage),
# ADR-005-fonction-scope-harnais (composition du harnais) et
# ADR-007-architecture-systeme-augmentation (les trois composants du systeme).
#
# Regles :
# - Seules les ressources vivantes sont versionnees (semver).
# - Les ressources point fixe (FND, ANL, logs, publications) et de travail
#   (PLN) ne figurent pas ici.
# - Toute modification d'un membre bumpe atomiquement le membre et son ensemble.
# - INTENTION.md est hors harnais et hors versionnage gere par l'agent.
#
# Separation des domaines de version (ADR-007) :
# - Ce manifeste couvre les trois ensembles vivants du systeme d'augmentation :
#   harness-files, documents-de-conception, clia.
# - La version du domaine metier (contenu du depot) est portee a part dans
#   version.yaml (racine), lue par `clia --version`. Elle evolue independamment
#   des ensembles ci-dessous.

version-manifeste: 0.2.0

ensembles:

  harness-files:
    version: 0.2.0
    description: >-
      Apparatus methodologique generique et reutilisable (aucune information
      de domaine). Voir ADR-005.
    membres:
      CLAUDE.md: 0.2.0
      CONSTITUTION.md: 0.2.0
      skl-001-skill-writer: 0.1.0
      skl-002-recherche-de-fondation: 0.1.0
      skl-003-plan-de-travail: 0.1.0
      skl-004-harnais: 0.1.0
      skl-006-adr: 0.1.0
      skl-008-log-ia-output: 0.1.0
      skl-009-specification: 0.1.0
      skl-010-requis: 0.1.0
      skl-011-codage-cli-bash: 0.1.0
      skl-012-analyse-corpus: 0.1.0
      skl-013-rapport-de-bogue: 0.1.0

  documents-de-conception:
    version: 0.2.0
    description: Decisions, specifications et requis (documents vivants).
    membres:
      ADR-001-type-livrable-analyse: 0.1.0
      ADR-002-convention-cli-bash: 0.1.0
      ADR-003-gestion-des-bogues: 0.1.0
      ADR-004-ressources-livrables: 0.1.0
      ADR-005-fonction-scope-harnais: 0.2.0
      ADR-006-gestion-des-sessions: 0.1.0
      ADR-007-architecture-systeme-augmentation: 0.1.0
      SPEC-001-convention-cli-bash: 0.1.0
      SPEC-002-cli-clia: 0.1.0
      SPEC-003-format-markdown-clia-session: 0.1.0
      REQ-001-convention-cli-bash: 0.1.0
      REQ-002-cli-clia: 0.1.0

  clia:
    version: 0.1.0
    description: >-
      CLI bash deterministe : transitions d'etat des sessions et inspection
      des ressources livrables et de leurs versions. Voir ADR-007, SPEC-002,
      REQ-002. N'est ni un document de conception, ni une ressource de harnais.
    membres:
      src/bin/clia: 0.1.0
      src/lib/common.sh: 0.1.0
      src/lib/version.sh: 0.1.0
      src/lib/resource.sh: 0.1.0
      src/lib/session.sh: 0.1.0
      setup.sh: 0.1.0

# Ressources vivantes hors ensemble (versionnees individuellement).
ressources-vivantes-individuelles:
  BUG-001-aucun-log-produit: 0.1.0
